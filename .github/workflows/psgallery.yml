name: Publish PowerShell Module

on:
  release:
    types: [published]

jobs:
  publish-to-gallery:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build and publish
      env:
        NUGET_KEY: ${{ secrets.NUGET_KEY }}
      shell: pwsh
      run: |
        .\build\build.ps1
        Write-Verbose "Updating"
        Publish-Module -Name "MyTestSOAModule" -NuGetApiKey $env:NUGET_KEY -Verbose